services:
  caddy:
    image: ghcr.io/juloc/caddy-ui:__CADDY_UI_VERSION__
    container_name: caddy
    command: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      DOMAIN: ${DOMAIN:-}
      NETCUP_CUSTOMER_NUMBER: ${NETCUP_CUSTOMER_NUMBER}
      NETCUP_API_KEY: ${NETCUP_API_KEY}
      NETCUP_API_PASSWORD: ${NETCUP_API_PASSWORD}
    volumes:
      - etc:/etc/caddy
      - data:/data
      - config:/config
      - logs:/var/log/caddy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:2019/config/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [proxy]

  caddy-ui:
    image: ghcr.io/juloc/caddy-ui:__CADDY_UI_VERSION__
    container_name: caddy-ui
    command: web
    depends_on:
      caddy:
        condition: service_healthy
    ports:
      - "8098:8098"
    environment:
      DOMAIN: ${DOMAIN:-}
      NETCUP_CUSTOMER_NUMBER: ${NETCUP_CUSTOMER_NUMBER}
      NETCUP_API_KEY: ${NETCUP_API_KEY}
      NETCUP_API_PASSWORD: ${NETCUP_API_PASSWORD}
      CADDY_UI_USERNAME: ${CADDY_UI_USERNAME:-admin}
      CADDY_UI_PASSWORD: ${CADDY_UI_PASSWORD}
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_UI_DATA_DIR: /var/lib/caddy-ui
    volumes:
      - etc:/etc/caddy
      - data:/data:ro
      - logs:/var/log/caddy:ro
      - ui-data:/var/lib/caddy-ui
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [proxy]

volumes:
  etc:
  data:
  config:
  logs:
  ui-data:

networks:
  proxy:
    external: true
