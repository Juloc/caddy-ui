name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Compile and test
        run: |
          python -m compileall -q caddy_ui caddy_ui_entrypoint.py scripts tests
          python -m unittest discover -v

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Format and tidy
        run: |
          UNFORMATTED="$(gofmt -l cmd caddyguard caddynetcp)"
          if [ -n "$UNFORMATTED" ]; then
            printf 'Go files need formatting:\n%s\n' "$UNFORMATTED"
            exit 1
          fi
          go mod tidy
      - name: Test and verify committed modules
        run: |
          go test ./...
          git diff --exit-code -- go.mod go.sum

  containers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [companion, bundle]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: caddy-ui:${{ matrix.target }}-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify bundled Caddy protection module
        if: matrix.target == 'bundle'
        run: |
          docker run --rm --entrypoint /usr/bin/caddy caddy-ui:bundle-test list-modules | grep -F 'http.handlers.caddy_ui_guard'
          printf ':8080 {\n  caddy_ui_guard {\n    requests 10\n    window 1m\n    burst 2\n    block 15m\n  }\n  respond "ok"\n}\n' \
            | docker run -i --rm --entrypoint /usr/bin/caddy caddy-ui:bundle-test adapt --adapter caddyfile --config /dev/stdin >/tmp/caddy-adapted.json
          grep -F 'caddy_ui_guard' /tmp/caddy-adapted.json
